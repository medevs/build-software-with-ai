<body>

  <a class="home" href="../../index.html" title="AI Builder Academy - all courses">&#8962; <span>Academy</span></a>

<div class="wrap">
  <p class="kicker">The full path</p>
  <h1>Curriculum</h1>
  <p class="dek">30 lessons · 7 modules · start at the top. A ✓ marks lessons you've opened on this device.</p>
  <div id="mods"></div>
  <p class="foot">Tip: the <a href="index.html">knowledge map</a> shows how every lesson connects.</p>
</div>

<script src="course.js"></script>
<script>
  var C = window.COURSE, root = document.getElementById("mods");
  C.modules.forEach(function (m) {
    var block = document.createElement("section");
    block.className = "modblock";
    var h = document.createElement("h2");
    h.style.borderLeftColor = m.color;
    h.textContent = "Module " + m.n + " — " + m.title.replace(/^.*?—\s*/, "");
    block.appendChild(h);
    var grid = document.createElement("div"); grid.className = "lessongrid";
    C.lessons.filter(function (l) { return l.module === m.id; }).forEach(function (l) {
      var visited = false;
      try { visited = !!localStorage.getItem("visited:" + l.slug); } catch (e) {}
      var a = document.createElement("a");
      a.className = "lcard" + (visited ? " visited" : "");
      a.href = "lessons/" + l.slug + ".html";
      a.style.borderLeftColor = m.color;
      a.innerHTML = '<div class="n">Lesson ' + l.n + '</div><div class="t">' + l.title + '</div><div class="b">' + l.blurb + '</div>';
      grid.appendChild(a);
    });
    block.appendChild(grid); root.appendChild(block);
  });
</script>
</body>
</html>
