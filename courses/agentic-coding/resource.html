<script>
(function () {
  var f = new URLSearchParams(location.search).get("f") || "";
  var doc = document.getElementById("doc");
  if (!/^resources\/[\w./-]+\.md$/.test(f) || f.indexOf("..") > -1) {
    doc.innerHTML = "<p>Resource not found. <a href='resources.html'>Back to all resources</a>.</p>"; return;
  }
  document.getElementById("raw").setAttribute("href", f);
  fetch(f).then(function (r) { if (!r.ok) throw 0; return r.text(); }).then(function (t) {
    doc.innerHTML = mdToHtml(t);
    var h1 = doc.querySelector("h1");
    if (h1) document.title = h1.textContent + " · The Agentic Coding Course";
  }).catch(function () {
    doc.innerHTML = "<p>Couldn't load this resource. <a href=\"" + f + "\" download>Download the raw file</a> instead.</p>";
  });
})();
</script>
</body>
